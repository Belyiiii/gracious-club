{{ define "main" }}
<section class="section section--light">
  <div class="container">
    <h1 class="title">{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <article>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p>{{ .Summary }}</p>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
